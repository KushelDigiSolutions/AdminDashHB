<div class="modal-body text-center p-4">
  <div class="mt-2">
      <i class="uil uil-trash-alt display-4 text-danger"></i>
      <h4 class="mt-4">Are you sure you want to {{data?.type=='blog'?'remove':'cancel'}} this {{data.value}}?</h4>
      <div class="mt-4">
          <button class="btn btn-success mx-2 px-4 yes-button" (click)="cancel('yes')">Yes</button>
          <button class="btn btn-danger mx-2 px-4 no-button" (click)="cancel('no')">No</button>
      </div>
  </div>
</div>
